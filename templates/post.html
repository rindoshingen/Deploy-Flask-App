{% extends "base.html" %} {% block content %} {% include "_page_title.html" %}

<section class="page__content">
    <a href="{{ url_for('blog') }}" class="blog__back">← Back to All Posts</a>
    <article class="blog-posting__single">
        <h2 class="blog-posting__title">{{ post.title }}</h2>
        <time class="blog__date">{{ post.date }}</time>
        <p class="blog-posting__content">{{ post.content }}</p>
    </article>
    {% include "_main_nav.html" %}
</section>
{% endblock %}
